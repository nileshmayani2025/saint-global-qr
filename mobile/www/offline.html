<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>No connection · Saint Globle</title>
    <style>
        /* Mirrors the app's dark "lux" ground so the fallback doesn't look like a crash. */
        :root { color-scheme: dark; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 18px; padding: 32px; text-align: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: #e8eff7;
            background:
                radial-gradient(600px 320px at 50% 0%, rgba(44,160,212,.16), transparent 60%),
                #060a12;
        }
        img { width: 84px; height: 84px; border-radius: 22px; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0; letter-spacing: -.02em; }
        p { margin: 0; color: #93a5b9; font-size: .94rem; line-height: 1.6; max-width: 30ch; }
        button {
            margin-top: 6px; border: 0; border-radius: .85rem; padding: 12px 26px;
            font-size: .95rem; font-weight: 600; color: #fff; cursor: pointer;
            background: linear-gradient(135deg, #43b4e0, #2ca0d4 45%, #1b6d97);
            box-shadow: 0 10px 24px -10px rgba(44,160,212,.65);
        }
        button:active { transform: translateY(1px); }
    </style>
</head>
<body>
    <img src="logo.png" alt="">
    <h1>No internet connection</h1>
    <p>Saint Globle needs a connection to verify products and update your rewards.</p>
    <button onclick="location.reload()">Try again</button>
</body>
</html>
